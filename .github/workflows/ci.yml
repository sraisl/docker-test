name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.1

    - name: get metadata
      uses: docker/metadata-action@v4.0.0
      with:
        images: ghcr.io/stefanprodan/helloworld
        tags: "latest"

